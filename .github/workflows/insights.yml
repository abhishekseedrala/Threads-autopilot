name: insights

# Runs once daily. Pulls Threads metrics for maturing posts and updates the
# learning loop (angle_scores, hour_scores, top_posts) in performance.json.

on:
  schedule:
    - cron: '0 2 * * *'      # 02:00 UTC (~07:30 IST)
  workflow_dispatch:

concurrency:
  group: threads-data          # same group as autopost — serialized against it
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Ensure tzdata (DST-correct timezones)
        run: pip install tzdata

      - name: Collect insights
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python scripts/collect_insights.py

      - name: Commit performance data
        run: |
          git config user.name  "autopost-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "insights: update scores [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && break
            echo "push attempt $i failed, retrying..."; sleep 5
          done
