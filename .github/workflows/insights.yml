name: Collect Insights (daily learning)
on:
  schedule:
    - cron: '30 22 * * *'   # daily, 4:00 AM IST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: posting
  cancel-in-progress: false

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pull insights and update scores
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python scripts/collect_insights.py
      - name: Commit learning data
        run: |
          git config user.name "threads-autopilot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "learn: daily insights update"
          git pull --rebase && git push
