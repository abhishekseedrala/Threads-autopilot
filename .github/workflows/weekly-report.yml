name: Weekly Report
on:
  schedule:
    - cron: '0 5 * * 0'   # Sunday morning
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/weekly_report.py
      - name: Commit report
        run: |
          git config user.name "threads-autopilot"
          git config user.email "bot@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "report: weekly autopilot report"
          git pull --rebase && git push
