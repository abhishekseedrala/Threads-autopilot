name: autopost

# Fires hourly. post_thread.py self-gates on active hours, daily quota and
# spacing, so most ticks generate a post but publish nothing. That is intended.

on:
  schedule:
    - cron: '5 * * * *'      # every hour at :05
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a post, bypassing the schedule gate'
        type: boolean
        default: false

concurrency:
  group: threads-data          # shared with insights.yml so they never race on the JSON files
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Ensure tzdata (DST-correct timezones)
        run: pip install tzdata

      - name: Generate post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate_post.py

      - name: Publish (self-gated)
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          FORCE_POST: ${{ inputs.force == true && '1' || '' }}
        run: python scripts/post_thread.py

      - name: Commit data changes
        run: |
          git config user.name  "autopost-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "autopost: publish + history [skip ci]"
          # pull-rebase before push so parallel workflows don't reject each other
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && break
            echo "push attempt $i failed, retrying..."; sleep 5
          done
